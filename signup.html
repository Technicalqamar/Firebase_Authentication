```
<div class="bg-animation"></div>

<div class="floating floating1"></div>
<div class="floating floating2"></div>
<div class="floating floating3"></div>

<div class="container">

    <div class="form-card" data-aos="zoom-in">

        <h1>Create Account</h1>
        <p>Join us and start your journey</p>

        <div class="input-box">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" placeholder="Email Address" id="email" >
        </div>

        <div class="input-box">
            <i class="fa-solid fa-lock"></i>
            <input id="password" type="password" placeholder="Password" autocomplete="new-password">
             <i
        class="fa-solid fa-eye"
        id="togglePassword">
              </i>
        </div>

        <button class="btn" id="btn" >
            Sign Up
        </button>

        <div class="bottom-text">
            Already have an account?
            <a href="login.html">Login</a>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<!-- <script type="module" src="js/firebase.js"></script> -->
<script type="module" src="js/signup.js"></script>

<script>
    AOS.init({
        duration: 1200
    });

    const password =
document.getElementById("password");

const togglePassword =
document.getElementById("togglePassword");

togglePassword.addEventListener("click", () => {

    if(password.type === "password"){

        password.type = "text";

        togglePassword.classList.remove("fa-eye");
        togglePassword.classList.add("fa-eye-slash");

    }else{

        password.type = "password";

        togglePassword.classList.remove("fa-eye-slash");
        togglePassword.classList.add("fa-eye");

    }

});
</script>
```
